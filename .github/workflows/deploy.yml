name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and Deploy Backend
        run: |
          gcloud run deploy futureartist-backend \
            --source ./backend \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars="GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get Backend URL
        id: backend
        run: |
          BACKEND_URL=$(gcloud run services describe futureartist-backend \
            --region $REGION \
            --format='value(status.url)')
          echo "url=$BACKEND_URL" >> $GITHUB_OUTPUT

      - name: Build and Deploy Frontend
        run: |
          gcloud run deploy futureartist-frontend \
            --source ./frontend \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars="NEXT_PUBLIC_API_URL=${{ steps.backend.outputs.url }}"

      - name: Get Frontend URL
        run: |
          FRONTEND_URL=$(gcloud run services describe futureartist-frontend \
            --region $REGION \
            --format='value(status.url)')
          echo "Frontend deployed to: $FRONTEND_URL"
